<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Built in function</title>
</head>
<body>
    <script>
        let obj={
    "name":"lj",
    "branch":"CE",
    "address":"sarkhej"
}

console.log(obj)
document.write(obj) //[object Object]
document.write(obj.name)
let obj1=JSON.stringify(obj)
console.log(obj1) // is in String
console.log(obj1.name)  //undefined
//document.write(obj1)



    let objh=`{
    "name":"lj",
    "branch":"CE",
    "address":"sarkhej"
}`

console.log(objh) // is in String
console.log(objh.name) //undefined
document.write(objh)
let objh1=JSON.parse(objh)
console.log(objh1.name)
document.write(objh1.name)
    </script>
</body>
</html>
